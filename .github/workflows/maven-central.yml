name: Publish Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
        type: string
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read

concurrency:
  group: maven-central-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish libraries
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        shell: bash
        env:
          WORKFLOW_DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${WORKFLOW_DISPATCH_VERSION}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release version must be a semantic version such as 0.1.0 or 0.1.0-rc.1." >&2
            exit 1
          fi
          if [[ "${VERSION}" == *"-SNAPSHOT" ]]; then
            echo "Release version must not end with -SNAPSHOT." >&2
            exit 1
          fi

          echo "RELEASE_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Verify
        run: ./gradlew checkMavenCentralPublishingConfiguration check --stacktrace

      - name: Publish and release
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishAndReleaseLibrariesToMavenCentral -PVERSION_NAME="${RELEASE_VERSION}" --no-configuration-cache --stacktrace
